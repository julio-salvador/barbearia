<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Gobbi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="produtos.html">
    <link rel="stylesheet" href="index.html">
</head>

<body>
    <header>
        <div class="caixa">
            <h1><img src="gobbi.jpg"></h1>

            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="produtos.html">Produtos </a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <form>
            <h1> FALE CONOSCO </h1>
            <fieldset>
                <p>Nome e Sobrenome</p>
                <input type="text" class="input-texto" required>

                <p>E-mail</p>
                <input type="text" class="input-texto" required placeholder="login@dominio.com">

                <p>Telefone</p>
                <input type="tel" class="input-texto" required placeholder="(99) 9 9999-9999">

                <p>Mensagem</p>
                <textarea cols="70" rows="10" required></textarea>

            </fieldset>

            <fieldset>
                <fieldset>
                    <legend>Como prefere o nosso contato?</legend>
                    <p><input type="radio" name="contato" value="email"> Email</p>
                    <p><input type="radio" name="contato" value="telefone"> Telefone</p>
                    <p><input type="radio" name="contato" value="whatsapp" checked> WhatsApp</p>
                </fieldset>
                <fieldset>
                    <legend>Qual horário prefere ser atendido?</legend>
                    <select>
                        <option>Manhã</option>
                        <option>Tarde</option>
                        <option>Noite</option>
                    </select>
                </fieldset>
                <p>
                    <input type="checkbox" checked>Gostaria de receber nossas novidades por email?
                </p>

                <button class="enviar"> Enviar Formulário </button>
        </form>



        </fieldset>
        </form>
    </main>

    <footer>
        <p class="copyright">&copy; Copyright Barbearia Alura - 2019</p>
    </footer>


</body>

</html>
